name: X Auto-Poster
on:
  schedule:
    - cron: '*/95 * * * *'  # ~15 posts/day, stays under 500/month free tier
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install httpx requests requests-oauthlib
      - name: Post tweet
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python bot.py
      - name: Commit history
        run: |
          git config user.name "x-bot"
          git config user.email "bot@auto.local"
          git add data/tweet_history.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "⬆️ Update history [skip ci]" && git push
